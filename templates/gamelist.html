{% extends "base.html" %}

{% block content %}
<div class="library-container">
    <div class="library-header">
        <h2 style="color: white;">ALL GAMES</h2>
        <p class="login-subtitle">Browse our complete database of titles</p>
    </div>

    <div class="game-grid">
        {% for game in games %}
        <div class="game-card">
            <div class="game-info">
                <h3 class="game-title-text">{{ game['title'] }}</h3>
            </div>
            <a href="/?game_id={{ game['id'] }}" class="view-btn">View Reviews</a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
